  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fsection>\n<section data-label=\"Agenda\" data-screen-label=\"02\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#CDEDE6;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#1F6B5E\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">What We'll Cover<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">From what mental health actually is, to how to look after yours and your friends.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 26V37\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"19\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">What mental health is<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Not the same as mental illness<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10V44M16 44H40\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M28 15L12 21M28 15L44 21\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M6 31L12 19L18 31C18 34 6 34 6 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M38 31L44 19L50 31C50 34 38 34 38 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">It is a spectrum<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">It moves up and down for everyone<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10L48 44H8L28 10Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 24V33\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"39\" r=\"1.7\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Why it matters now<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Most challenges begin in the teen years<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M14 42C12 28 22 13 44 12C44 33 33 44 16 44\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M18 40C24 32 32 26 40 22\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">What keeps it healthy<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Daily habits that protect your mind<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 13C10 11 12 9 14 9H42C44 9 46 11 46 13V31C46 33 44 35 42 35H24L15 43V35H14C12 35 10 33 10 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">When to reach out<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">In yourself and in friends<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Where to get help<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">People and lines always open<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Define\" data-screen-label=\"03\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C2E8DF;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><div style=\"position:absolute;top:84px;right:120px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;top:-130px;left:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Mental Health Is Not Mental Illness<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Two different things that often get mixed up.<\u002Fp><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\"><div style=\"background:#E3F5F1;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 46C28 46 8 34 8 20.5C8 14 12.5 10.5 17 10.5C21 10.5 25 13 28 17C31 13 35 10.5 39 10.5C43.5 10.5 48 14 48 20.5C48 34 28 46 28 46Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#1F7A6E;\">Mental health<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#1F6B5E;margin-bottom:13px;\">How you think, feel, and cope with life.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#4E7A72;line-height:1.55;text-align:justify;\">Everyone has it, every day. It shapes how you handle stress, relate to others, and make choices, and it naturally rises and falls.<\u002Fdiv><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#F0934A;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 26V37\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"19\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#1F7A6E;\">Mental illness<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#1F6B5E;margin-bottom:13px;\">A diagnosed condition like anxiety or depression.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#4E7A72;line-height:1.55;text-align:justify;\">You can have good mental health while managing an illness, and you can struggle without ever having a diagnosis. They are related, not the same.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Why it matters\" data-screen-label=\"04\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#CDEDE6;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;right:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#1F6B5E\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;bottom:80px;left:104px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Why This Matters<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Mental health challenges are common, and they tend to start young.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"background:#E3F5F1;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#1F7A6E;\">1 in 5<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#4E7A72;margin-top:12px;line-height:1.4;\">Canadians experiences a mental health problem or illness in any given year.<\u002Fdiv><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#1F7A6E;\">50%<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#4E7A72;margin-top:12px;line-height:1.4;\">of mental illnesses begin by age 14, which is why the teen years matter.<\u002Fdiv><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#1F7A6E;\">75%<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#4E7A72;margin-top:12px;line-height:1.4;\">have begun by age 24, often before anyone reaches out for help.<\u002Fdiv><\u002Fdiv><div style=\"background:#F0934A;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(40,40,80,0.16);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#fff;\">Stigma<\u002Fdiv><div style=\"font-size:20px;font-weight:700;color:#fff;margin-top:12px;line-height:1.4;\">is the number one barrier to getting help, not a lack of treatment.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-family:'Mulish';font-size:18px;font-weight:600;color:#7FB3A9;text-align:center;margin-top:34px;\">Source: Canadian Mental Health Association (CMHA)<\u002Fp><\u002Fsection>\n<section data-label=\"Protective habits\" data-screen-label=\"05\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C2E8DF;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><div style=\"position:absolute;top:84px;left:110px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">What Keeps Your Mind Well<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Small daily choices are real protection, not just nice ideas.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 18V44M8 33H48V44M48 38V31C48 28 46 26 43 26H24V33\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"16\" cy=\"30\" r=\"4\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Sleep<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">8 to 10 hours resets mood and focus<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"35\" cy=\"12\" r=\"5\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M31 21L22 27L28 33L24 47M28 33L38 37L43 31M22 27L13 24\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Move<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Activity lowers stress hormones<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"21\" cy=\"20\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"39\" cy=\"22\" r=\"6\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M9 46C9 36 14 31 21 31C28 31 33 36 33 46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M35 33C41 33 47 37 47 46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Connect<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Real relationships protect you<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 13C10 11 12 9 14 9H42C44 9 46 11 46 13V31C46 33 44 35 42 35H24L15 43V35H14C12 35 10 33 10 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Talk<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Naming feelings shrinks them<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Unplug<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Curate what you feed your mind<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M14 42C12 28 22 13 44 12C44 33 33 44 16 44\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M18 40C24 32 32 26 40 22\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Routine<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Small structure steadies you<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"When to reach out\" data-screen-label=\"06\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#CDEDE6;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#1F6B5E\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Signs It Is Time to Talk<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">In yourself or a friend, watch for changes that last more than a couple of weeks.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M41 32C37 38 29 40 23 36C17 32 16 24 20 18C13 20 9 28 12 35C15 43 24 47 32 44C37 42 40 38 41 32Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Sleep changes<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Sleeping far more or far less<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"28\" r=\"7\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Pulling away<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Dropping friends and activities<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10L48 44H8L28 10Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 24V33\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"39\" r=\"1.7\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Lasting low mood<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Down or hopeless for weeks<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">On edge<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Irritable, anxious, overwhelmed<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 19C24 13 16 14 14 21C12 28 18 44 28 44C38 44 44 28 42 21C40 14 32 13 28 19Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 19V13C28 10 31 8 34 9\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Appetite shifts<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Eating much more or less<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 26V37\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"19\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Cannot focus<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Grades or concentration slipping<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"You are not alone\" data-screen-label=\"07\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C2E8DF;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><div style=\"position:absolute;top:84px;right:120px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;top:-130px;left:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">How to Get Support<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Reaching out is a sign of strength, not weakness.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 13C10 11 12 9 14 9H42C44 9 46 11 46 13V31C46 33 44 35 42 35H24L15 43V35H14C12 35 10 33 10 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Tell someone you trust<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">A friend, parent, coach, or teacher is a first step.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"21\" cy=\"20\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"39\" cy=\"22\" r=\"6\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M9 46C9 36 14 31 21 31C28 31 33 36 33 46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M35 33C41 33 47 37 47 46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">See your school counsellor<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">They connect you to help and keep it private.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Kids Help Phone<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Call 1-800-668-6868 or text CONNECT to 686868.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#E3F5F1;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 30L20 40C22 42 25 43 28 43H40C44 43 46 40 46 36\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M30 10C27 7 22 8 21 13C20 17 28 24 28 24C28 24 36 17 35 13C34 8 30 8 30 12\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Check on friends<\u002Fdiv><div style=\"font-size:20px;color:#7FB3A9;font-weight:600;margin-top:5px;\">Ask, listen, and stay with them. You can be the one who helps.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Myth vs fact\" data-screen-label=\"08\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#CDEDE6;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;right:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#1F6B5E\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;bottom:80px;left:104px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Myth vs Fact<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Stigma grows from myths. Let us clear three up.<\u002Fp><div style=\"display:flex;flex-direction:column;gap:18px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#B5DCD3;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#7FB3A9\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#7FB3A9\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#4E7A72;\">Mental health problems are rare.<\u002Fp><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#2A9D8F\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#2A9D8F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#1F6B5E;\">One in five Canadians is affected every year. It is common.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#B5DCD3;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#7FB3A9\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#7FB3A9\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#4E7A72;\">Talking about it makes it worse.<\u002Fp><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#2A9D8F\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#2A9D8F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#1F6B5E;\">Talking is one of the most protective things you can do.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#B5DCD3;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#7FB3A9\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#7FB3A9\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#4E7A72;\">You should just toughen up.<\u002Fp><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#2A9D8F\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#2A9D8F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#1F6B5E;\">Mental health is health. Willpower is not a treatment.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"In focus\" data-screen-label=\"09\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C2E8DF;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;align-items:center;gap:64px;padding:0 110px;\"><div style=\"position:absolute;top:80px;right:120px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;bottom:-130px;left:-110px;\"><\u002Fdiv><div style=\"flex:none;width:620px;height:680px;border-radius:28px;border:6px solid #fff;box-shadow:0 16px 40px rgba(40,40,80,0.20);overflow:hidden;background:#B5DCD3;\"><image-slot id=\"mh-photo-v2\" src=\"9f62ca09-9c3a-44cd-87f6-9e67fd72e42b\" style=\"width:100%;height:100%;display:block;background:#E2F4EF;\" shape=\"rect\" fit=\"contain\" placeholder=\"Drop a real photo here to replace the illustration\"><\u002Fimage-slot><\u002Fdiv><div style=\"flex:1;\"><div style=\"font-family:'Mulish';font-weight:800;font-size:22px;letter-spacing:1.5px;text-transform:uppercase;color:#7FB3A9;margin-bottom:10px;\">A skill you can practise<\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:60px;line-height:1.0;margin-bottom:18px;\">Grounding: 5-4-3-2-1<\u002Fh2><p style=\"font-family:'Mulish';font-weight:500;font-size:23px;color:#4E7A72;line-height:1.5;margin-bottom:30px;max-width:760px;\">When your mind races, this quick exercise pulls you back to the present. Try it together right now.<\u002Fp><div style=\"display:flex;flex-direction:column;gap:16px;max-width:780px;\"><div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#2A9D8F;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">1<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#1F6B5E;\">Name 5 things you can see<\u002Fp><\u002Fdiv><div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#2A9D8F;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">2<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#1F6B5E;\">Name 4 things you can feel<\u002Fp><\u002Fdiv><div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#2A9D8F;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">3<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#1F6B5E;\">Name 3 things you can hear<\u002Fp><\u002Fdiv><div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#F0934A;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">4<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#1F6B5E;\">Then 2 you can smell, and 1 you can taste<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Activity\" data-screen-label=\"10\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#CDEDE6;font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><div style=\"position:absolute;top:84px;left:110px;width:150px;height:46px;background-image:radial-gradient(#2A9D8F 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #58C3B4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Your Turn, Talk It Through<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#4E7A72;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Get into small groups and keep it judgment-free.<\u002Fp><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\"><div style=\"background:#E3F5F1;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:800;font-size:34px;color:#F0934A;margin-bottom:18px;\">Scenario<\u002Fdiv><p style=\"font-size:23px;font-weight:500;color:#4E7A72;line-height:1.5;\">A friend has gone quiet, stopped coming to practice, and seems flat lately. In your group, plan what you would actually say to them.<\u002Fp><\u002Fdiv><div style=\"background:#E3F5F1;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:800;font-size:34px;color:#1F7A6E;margin-bottom:18px;\">Talk about it<\u002Fdiv><ul style=\"font-size:23px;font-weight:500;color:#4E7A72;line-height:1.7;padding-left:24px;margin:0;\"><li>What words show you are really listening?<\u002Fli><li>Who is a trusted adult you could bring in?<\u002Fli><li>What is one habit on this list you could start this week?<\u002Fli><li>What would you want a friend to do for you?<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Recap\" data-screen-label=\"11\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:linear-gradient(150deg,#BFE9E0 0%,#CDEDE6 70%);font-family:'Mulish',sans-serif;color:#1F6B5E;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 110px;\"><div style=\"position:absolute;width:380px;height:380px;border-radius:50%;border:54px solid #58C3B4;opacity:0.4;top:-160px;right:-150px;\"><\u002Fdiv><div style=\"position:absolute;width:200px;height:200px;border-radius:50%;background:#1F7A6E;opacity:0.5;bottom:-100px;left:-100px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:74px;margin-bottom:30px;position:relative;\">Three Things to Carry<\u002Fh2><div style=\"display:flex;gap:22px;margin-bottom:42px;position:relative;\"><div style=\"width:230px;background:#E3F5F1;border-radius:22px;padding:30px;box-shadow:0 10px 26px rgba(60,55,95,0.10);\"><div style=\"width:76px;height:76px;border-radius:19px;background:#2A9D8F;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"28\" r=\"7\" stroke=\"#fff\" stroke-width=\"3.4\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#1F6B5E;\">Notice<\u002Fdiv><\u002Fdiv><div style=
