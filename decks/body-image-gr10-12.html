document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t><\u002Fsvg><div style=\"position:absolute;bottom:150px;right:140px;width:150px;height:46px;background-image:radial-gradient(#E15C92 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><img src=\"afc0b62f-2439-44a5-859c-4c7dc33bfe43\" alt=\"\" style=\"position:absolute;bottom:0;left:60px;height:400px;z-index:1;pointer-events:none;filter:drop-shadow(0 12px 24px rgba(40,40,80,0.18));\"><div style=\"position:relative;z-index:2;font-family:'Mulish';font-weight:800;font-size:30px;letter-spacing:0.5px;color:#C23E78;margin-bottom:30px;\">Presented by Together for Health<\u002Fdiv><div style=\"position:relative;z-index:2;width:188px;height:188px;border-radius:50%;background:rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;margin-bottom:34px;box-shadow:0 10px 30px rgba(40,40,80,0.14);\"><svg width=\"104\" height=\"104\" viewBox=\"0 0 56 56\" fill=\"none\"><ellipse cx=\"28\" cy=\"21\" rx=\"14\" ry=\"16\" stroke=\"#3FA6A0\" stroke-width=\"2.8\"><\u002Fellipse><path d=\"M28 37V48M20 48H36\" stroke=\"#3FA6A0\" stroke-width=\"2.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h1 style=\"position:relative;z-index:2;font-family:'Playfair Display';font-weight:900;font-size:92px;line-height:0.95;letter-spacing:1px;color:#A8326A;margin-bottom:14px;\">BODY IMAGE<\u002Fh1><div style=\"position:relative;z-index:2;display:flex;align-items:center;gap:18px;margin-bottom:26px;\"><span style=\"width:90px;height:2px;background:#D687A8;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#A8326A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;border:2px solid #D687A8;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;border:2px solid #D687A8;\"><\u002Fspan><span style=\"width:90px;height:2px;background:#D687A8;\"><\u002Fspan><\u002Fdiv><p style=\"position:relative;z-index:2;font-family:'Mulish';font-weight:600;font-size:28px;color:#8E5874;max-width:900px;line-height:1.45;\">For Grades 10–12. A look at how we see our bodies, what social media does to that, and how to feel okay in your own skin.<\u002Fp><\u002Fsection>\n<section data-label=\"Agenda\" data-screen-label=\"02\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F8D8E6;font-family:'Mulish',sans-serif;color:#A8326A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"078d07c1-8bfd-49cd-a17a-82c1d307f397\" alt=\"\" style=\"position:absolute;right:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#A8326A\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08CB4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">What We'll Cover<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5874;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">We'll cover what body image is and how to take back control of your feed.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 26V37\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"19\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">What body image is<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">How you see your body<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"28\" r=\"7\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">The comparison trap<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Filters and unreal standards<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10V44M16 44H40\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M28 15L12 21M28 15L44 21\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M6 31L12 19L18 31C18 34 6 34 6 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M38 31L44 19L50 31C50 34 38 34 38 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Body neutrality<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Beyond positive or negative<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 46C28 46 8 34 8 20.5C8 14 12.5 10.5 17 10.5C21 10.5 25 13 28 17C31 13 35 10.5 39 10.5C43.5 10.5 48 14 48 20.5C48 34 28 46 28 46Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Why it matters<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Links to self-esteem and mood<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Curating your feed<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Control what you see<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 13C10 11 12 9 14 9H42C44 9 46 11 46 13V31C46 33 44 35 42 35H24L15 43V35H14C12 35 10 33 10 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Getting support<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">When to reach out<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Define\" data-screen-label=\"03\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F4C7DB;font-family:'Mulish',sans-serif;color:#A8326A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"d621e64c-9720-45b1-b90c-e14684f0f7ef\" alt=\"\" style=\"position:absolute;left:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><div style=\"position:absolute;top:84px;right:120px;width:150px;height:46px;background-image:radial-gradient(#E15C92 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08CB4;opacity:0.38;top:-130px;left:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">How You See Your Body<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5874;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">How you see your body can change. It isn't set in stone.<\u002Fp><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\"><div style=\"background:#FCE6EF;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><ellipse cx=\"28\" cy=\"21\" rx=\"14\" ry=\"16\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fellipse><path d=\"M28 37V48M20 48H36\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#C23E78;\">Body image<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#A8326A;margin-bottom:13px;\">How you think, feel, and see your own body.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#8E5874;line-height:1.55;text-align:justify;\">It can be positive, negative, or neutral, and it shifts over time. It is shaped by what you see, hear, and scroll, not just by how you look.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6EF;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#3FA6A0;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10V44M16 44H40\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M28 15L12 21M28 15L44 21\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M6 31L12 19L18 31C18 34 6 34 6 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M38 31L44 19L50 31C50 34 38 34 38 31Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#C23E78;\">Body neutrality<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#A8326A;margin-bottom:13px;\">Valuing what your body does, not just how it looks.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#8E5874;line-height:1.55;text-align:justify;\">You do not have to love your reflection every day. Respecting your body for what it lets you do is a calmer, healthier goal than constant positivity.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Why it matters\" data-screen-label=\"04\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F8D8E6;font-family:'Mulish',sans-serif;color:#A8326A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"948e5a36-8de4-4dc3-bbca-71f7b3174686\" alt=\"\" style=\"position:absolute;right:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;right:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#A8326A\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;bottom:80px;left:104px;width:150px;height:46px;background-image:radial-gradient(#E15C92 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Why This Matters<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5874;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Most of what shapes how we feel has been filtered and edited.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"background:#FCE6EF;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E78;\">Edited<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5874;margin-top:12px;line-height:1.4;\">most images you scroll are filtered, posed, or retouched.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6EF;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E78;\">Compare<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5874;margin-top:12px;line-height:1.4;\">comparison to those images is the biggest driver of poor body image.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6EF;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E78;\">Linked<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5874;margin-top:12px;line-height:1.4;\">poor body image connects to low self-esteem and anxiety.<\u002Fdiv><\u002Fdiv><div style=\"background:#3FA6A0;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(40,40,80,0.16);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#fff;\">Your feed<\u002Fdiv><div style=\"font-size:20px;font-weight:700;color:#fff;margin-top:12px;line-height:1.4;\">curating who you follow measurably improves how you feel.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-family:'Mulish';font-size:18px;font-weight:600;color:#D687A8;text-align:center;margin-top:34px;\">Source: Canadian Mental Health Association; NEDIC<\u002Fp><\u002Fsection>\n<section data-label=\"The comparison trap\" data-screen-label=\"05\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F4C7DB;font-family:'Mulish',sans-serif;color:#A8326A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"ea74ac09-7819-4749-a24e-ee1de3e7251a\" alt=\"\" style=\"position:absolute;left:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><div style=\"position:absolute;top:84px;left:110px;width:150px;height:46px;background-image:radial-gradient(#E15C92 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08CB4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Why Social Media Distorts It<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5874;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">The feed is designed to make you compare yourself, then sell to you.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"28\" r=\"7\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Filters<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Faces and bodies are edited<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 8L34 21L48 23L38 33L40.5 47L28 40L15.5 47L18 33L8 23L22 21Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Highlight reels<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">You see the best 1% only<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"31\" r=\"16\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 22V31L34 35M22 9H34M28 9V15\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Endless scroll<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Constant comparison fuel<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"28\" cy=\"28\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Ads sell insecurity<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">They profit from you feeling not enough<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"21\" cy=\"20\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"39\" cy=\"22\" r=\"6\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M9 46C9 36 14 31 21 31C28 31 33 36 33 46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M35 33C41 33 47 37 47 46\" " rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#A8326A\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08CB4;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">How Body Image Affects You<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5874;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">This affects a lot more than how you look in the mirror.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 46C28 46 8 34 8 20.5C8 14 12.5 10.5 17 10.5C21 10.5 25 13 28 17C31 13 35 10.5 39 10.5C43.5 10.5 48 14 48 20.5C48 34 28 46 28 46Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Self-esteem<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">It shapes how you value yourself<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M24 12C18 12 15 16 16 21C12 22 12 28 16 30C15 35 19 39 24 38M32 12C38 12 41 16 40 21C44 22 44 28 40 30C41 35 37 39 32 38M24 12C26 10 30 10 32 12M24 38C26 40 30 40 32 38M28 13V38\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Mood and anxiety<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Poor body image can fuel both<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 19C24 13 16 14 14 21C12 28 18 44 28 44C38 44 44 28 42 21C40 14 32 13 28 19Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 19V13C28 10 31 8 34 9\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Eating habits<\u002Fdiv><div style=\"font-size:20px;color:#D687A8;font-weight:600;margin-top:5px;\">Can drive disordered eating<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6EF;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E15C92;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" st ;font-weight:700;line-height:1.35;color:#A8326A;\">Most images are filtered, posed, and carefully edited.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#F4C0D6;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#D687A8\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#D687A8\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#8E5874;\">You have to love your body all the time.<\u002Fp><\u002Fdiv><div style=\"background:#FCE6EF;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#E15C92\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#E15C92\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#A8326A;\">Body neutrality, simply respecting it, is a healthy goal.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#F4C0D6;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#D687A8\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#D687A8\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#8E5874;\">Body image is just vanity.<\u002Fp><\u002Fdiv><div style=\"background:#FCE6EF;border-radius:18px;padding:24px 30p
