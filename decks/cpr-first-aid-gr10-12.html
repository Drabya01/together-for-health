  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <svg width=\"170\" height=\"64\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;bottom:70px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <div style=\"position:absolute;top:150px;left:130px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:150px;right:140px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:2;font-family:'Mulish';font-weight:800;font-size:30px;letter-spacing:0.5px;color:#4E5BB8;margin-bottom:30px;\">Presented by Together for Health<\u002Fdiv>\n  <div style=\"position:relative;z-index:2;width:188px;height:188px;border-radius:50%;background:rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;margin-bottom:34px;box-shadow:0 10px 30px rgba(62,71,150,0.14);\">\n    <svg width=\"120\" height=\"108\" viewBox=\"0 0 120 108\" fill=\"none\"><path d=\"M60 102C60 102 14 74 14 41C14 25 26 16 38 16C48 16 56 22 60 31C64 22 72 16 82 16C94 16 106 25 106 41C106 74 60 102 60 102Z\" fill=\"#EE4F54\"><\u002Fpath><path d=\"M30 56H44L49 42L58 74L63 56H78\" stroke=\"#fff\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n  <\u002Fdiv>\n  <h1 style=\"position:relative;z-index:2;font-family:'Playfair Display';font-weight:900;font-size:104px;line-height:0.95;letter-spacing:1px;color:#3E4796;margin-bottom:14px;\">CPR &amp; FIRST AID<\u002Fh1>\n  <div style=\"position:relative;z-index:2;display:flex;align-items:center;gap:18px;margin-bottom:26px;\">\n    <span style=\"width:90px;height:2px;background:#8A92D8;\"><\u002Fspan>\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#3E4796;\"><\u002Fspan>\n    <span style=\"width:11px;height:11px;border-radius:50%;border:2px solid #8A92D8;\"><\u002Fspan>\n    <span style=\"width:11px;height:11px;border-radius:50%;border:2px solid #8A92D8;\"><\u002Fspan>\n    <span style=\"width:90px;height:2px;background:#8A92D8;\"><\u002Fspan>\n  <\u002Fdiv>\n  <p style=\"position:relative;z-index:2;font-family:'Mulish';font-weight:600;font-size:28px;color:#5E6498;max-width:880px;line-height:1.45;\">A Together for Health lesson for Grades 10 to 12. The skills that let an ordinary person keep someone alive until help arrives.<\u002Fp>\n<\u002Fsection>\n<section data-label=\"Agenda\" data-screen-label=\"02\" data-speaker-notes=\"Quick roadmap. This is a skills lesson. The goal is the confidence to act, not memorising a textbook.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\">\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.40;bottom:-130px;right:-110px;\"><\u002Fdiv>\n  <div style=\"position:absolute;top:80px;right:120px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:108px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:74px;text-align:center;margin-bottom:8px;\">What We'll Cover<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:50px;\">From what is happening inside the body, to exactly what your hands do about it.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;max-width:1560px;margin:0 auto;width:100%;\">\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 46C28 46 8 34 8 20.5C8 14 12.5 10.5 17 10.5C21 10.5 25 13 28 17C31 13 35 10.5 39 10.5C43.5 10.5 48 14 48 20.5C48 34 28 46 28 46Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 27H22L25 21L30 35L33 27H40\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">What cardiac arrest is<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">And how it differs from a heart attack<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"30\" r=\"19\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 19V30L36 35\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M21 7H35\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">Why it matters<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">The numbers that make you act<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><rect x=\"9\" y=\"22\" width=\"26\" height=\"15\" rx=\"7.5\" stroke=\"#fff\" stroke-width=\"3\"><\u002Frect><rect x=\"21\" y=\"22\" width=\"26\" height=\"15\" rx=\"7.5\" stroke=\"#fff\" stroke-width=\"3\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">The Chain of Survival<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">Four links that save a life<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 22V34M22 28H34\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">Hands-only CPR<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">Step by step, no fear<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">Using an AED<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">The machine talks you through it<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(62,71,150,0.08);\">\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"28\" cy=\"28\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 8V20M28 36V48M8 28H20M36 28H48\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.05;\">Choking &amp; recovery<\u002Fdiv><div style=\"font-size:19px;color:#7077AA;font-weight:600;margin-top:4px;\">Two more skills worth knowing<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"What is it\" data-screen-label=\"03\" data-speaker-notes=\"The most common confusion. A heart attack is a blocked pipe and the person is usually awake. Cardiac arrest is the electrical system failing, the heart stops, the person collapses and is unresponsive. A heart attack can trigger a cardiac arrest. One in three Canadians cannot tell them apart.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#BFC4F2;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\">\n  <div style=\"position:absolute;width:340px;height:340px;border-radius:50%;border:50px solid #6B75D6;opacity:0.40;top:-150px;left:-130px;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:200px;height:200px;border-radius:50%;background:#5763C4;opacity:0.5;top:-110px;left:-110px;\"><\u002Fdiv>\n  <img src=\"93d322d1-8dc2-4062-9e40-137a650a95e8\" alt=\"\" style=\"position:absolute;bottom:18px;right:24px;width:330px;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(62,71,150,0.16));\">\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Cardiac Arrest Is Not a Heart Attack<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">One in three Canadians cannot tell these two apart. The response is different, so it is worth knowing.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\">\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\"><div style=\"width:78px;height:78px;border-radius:19px;background:#EE4F54;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M37 6L31 22L37 24L29 40\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#D33A40;\">Cardiac arrest<\u002Fdiv><\u002Fdiv>\n      <p style=\"font-size:25px;font-weight:700;line-height:1.4;margin-bottom:12px;color:#3E4796;\">An electrical problem. The heart suddenly stops beating.<\u002Fp>\n      <p style=\"font-size:23px;font-weight:500;color:#5E6498;line-height:1.55;text-align:justify;\">The person collapses, is unresponsive, and is not breathing normally. This is the moment you start CPR.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\"><div style=\"width:78px;height:78px;border-radius:19px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M19 26C22 30 25 27 28 30C31 33 34 29 37 32\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#4E5BB8;\">Heart attack<\u002Fdiv><\u002Fdiv>\n      <p style=\"font-size:25px;font-weight:700;line-height:1.4;margin-bottom:12px;color:#3E4796;\">A plumbing problem. Blood flow to the heart is blocked.<\u002Fp>\n      <p style=\"font-size:23px;font-weight:500;color:#5E6498;line-height:1.55;text-align:justify;\">The person is usually awake, with chest pain, sweating, or shortness of breath. Call 911 fast, because it can trigger an arrest.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"Why it matters\" data-screen-label=\"04\" data-speaker-notes=\"Let these land one at a time. The headline: a bystander, someone exactly like you, doubles the chance of survival. Most arrests happen at home or in public, so the person you save is most likely a family member, friend, or stranger nearby. Source: Heart and Stroke 2024 Every Second Counts report.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\">\n  <div style=\"position:absolute;top:84px;left:110px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.40;bottom:-130px;right:-110px;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Why This Matters<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:46px;max-width:1180px;margin-left:auto;margin-right:auto;\">Cardiac arrest is far more common than people think, and it usually happens in front of ordinary people.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\">\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(62,71,150,0.10);\">\n      <div style=\"font-family:'Playfair Display';font-weight:900;font-size:70px;line-height:1;color:#4E5BB8;\">60,000<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:600;color:#5E6498;margin-top:12px;line-height:1.4;\">cardiac arrests happen outside hospital in Canada each year. That is one every nine minutes.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(62,71,150,0.10);\">\n      <div style=\"font-family:'Playfair Display';font-weight:900;font-size:70px;line-height:1;color:#4E5BB8;\">1 in 10<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:600;color:#5E6498;margin-top:12px;line-height:1.4;\">survive. That number climbs fast the moment a bystander steps in.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(62,71,150,0.10);\">\n      <div style=\"font-family:'Playfair Display';font-weight:900;font-size:70px;line-height:1;color:#4E5BB8;\">Half<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:600;color:#5E6498;margin-top:12px;line-height:1.4;\">of arrests happen to people under 65. It is not only an older person's emergency.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#EE4F54;border-radius:22px;padding:36px 30px;box-shadow:0 12px 28px rgba(238,79,84,0.28);\">\n      <div style=\"font-family:'Playfair Display';font-weight:900;font-size:70px;line-height:1;color:#fff;\">2×<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:700;color:#fff;margin-top:12px;line-height:1.4;\">survival can double when a bystander does CPR and uses an AED.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-family:'Mulish';font-size:18px;font-weight:600;color:#7077AA;text-align:center;margin-top:36px;\">Source: Heart &amp; Stroke Foundation of Canada, Every Second Counts (2024)<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Chain of Survival\" data-screen-label=\"05\" data-speaker-notes=\"Each link depends on the one before it. Bystanders own the first two links, Call and Push, and those are the links that matter most before paramedics arrive. Walk left to right.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#BFC4F2;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 96px;\">\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;right:120px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">The Chain of Survival<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:48px;max-width:1180px;margin-left:auto;margin-right:auto;\">Four links. The first two belong to you, the bystander, and they matter most.<\u002Fp>\n  <div style=\"display:flex;align-items:stretch;gap:16px;max-width:1620px;margin:0 auto;width:100%;\">\n    <div style=\"flex:1;background:#ECEEFC;border-radius:22px;padding:32px 28px;box-shadow:0 8px 22px rgba(62,71,150,0.10);text-align:center;\">\n      <div style=\"width:80px;height:80px;border-radius:20px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Mulish';font-weight:800;font-size:17px;letter-spacing:1.5px;text-transform:uppercase;color:#8A92D8;margin-bottom:4px;\">Link 1<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:32px;margin-bottom:8px;\">Call 911<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Or send someone. Put it on speaker so the dispatcher can coach you.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;font-family:'Playfair Display';font-size:42px;color:#8A92D8;font-weight:700;\">›<\u002Fdiv>\n    <div style=\"flex:1;background:#ECEEFC;border-radius:22px;padding:32px 28px;box-shadow:0 8px 22px rgba(62,71,150,0.10);text-align:center;\">\n      <div style=\"width:80px;height:80px;border-radius:20px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 22V34M22 28H34\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Mulish';font-weight:800;font-size:17px;letter-spacing:1.5px;text-transform:uppercase;color:#8A92D8;margin-bottom:4px;\">Link 2<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:32px;margin-bottom:8px;\">Push<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Start chest compressions right away to keep blood moving to the brain.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;font-family:'Playfair Display';font-size:42px;color:#8A92D8;font-weight:700;\">›<\u002Fdiv>\n    <div style=\"flex:1;background:#ECEEFC;border-radius:22px;padding:32px 28px;box-shadow:0 8px 22px rgba(62,71,150,0.10);text-align:center;\">\n      <div style=\"width:80px;height:80px;border-radius:20px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Mulish';font-weight:800;font-size:17px;letter-spacing:1.5px;text-transform:uppercase;color:#8A92D8;margin-bottom:4px;\">Link 3<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:32px;margin-bottom:8px;\">Shock<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Use the nearest AED as soon as it arrives. It guides you out loud.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;font-family:'Playfair Display';font-size:42px;color:#8A92D8;font-weight:700;\">›<\u002Fdiv>\n    <div style=\"flex:1;background:#ECEEFC;border-radius:22px;padding:32px 28px;box-shadow:0 8px 22px rgba(62,71,150,0.10);text-align:center;\">\n      <div style=\"width:80px;height:80px;border-radius:20px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><rect x=\"9\" y=\"16\" width=\"38\" height=\"26\" rx=\"5\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Frect><path d=\"M28 23V35M22 29H34\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M9 24H47\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Mulish';font-weight:800;font-size:17px;letter-spacing:1.5px;text-transform:uppercase;color:#8A92D8;margin-bottom:4px;\">Link 4<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:32px;margin-bottom:8px;\">Advanced care<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Paramedics and the hospital take over from here.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"Hands-only CPR\" data-screen-label=\"06\" data-speaker-notes=\"The heart of the lesson. For an untrained teen bystander, hands-only CPR with no breaths is the recommendation. Demonstrate the rhythm. 100 to 120 beats a minute is the tempo of Stayin Alive or Baby Shark. Push hard, about 5 cm deep, let the chest come all the way back up between pushes. Do not stop until help takes over or an AED is ready.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 96px;\">\n  <div style=\"position:absolute;width:280px;height:280px;border-radius:50%;border:44px solid #6B75D6;opacity:0.38;top:-120px;right:-100px;\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:80px;left:104px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:70px;text-align:center;margin-bottom:8px;\">Hands-Only CPR<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:42px;max-width:1240px;margin-left:auto;margin-right:auto;\">If an adult suddenly collapses and is not breathing normally, this is all you need to do until help arrives. No rescue breaths.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:22px;max-width:1620px;margin:0 auto;width:100%;\">\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 8px 22px rgba(62,71,150,0.10);position:relative;\">\n      <div style=\"position:absolute;top:22px;right:26px;font-family:'Playfair Display';font-weight:900;font-size:42px;color:#D7DAF5;\">01<\u002Fdiv>\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M20 26V14C20 11 24 11 24 14V24M24 24V11C24 8 28 8 28 11V24M28 24V13C28 10 32 10 32 13V25M32 25V16C32 13 36 13 36 16V32C36 41 31 47 23 47C18 47 15 44 13 39L9 30C8 27 12 25 14 28L20 36\" stroke=\"#fff\" stroke-width=\"2.8\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:26px;margin-bottom:8px;line-height:1.1;\">Hands on the chest<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Heel of one hand on the centre of the breastbone, the other hand on top, fingers laced.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 8px 22px rgba(62,71,150,0.10);position:relative;\">\n      <div style=\"position:absolute;top:22px;right:26px;font-family:'Playfair Display';font-weight:900;font-size:42px;color:#D7DAF5;\">02<\u002Fdiv>\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 8V40M28 40L17 29M28 40L39 29\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M14 48H42\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:26px;margin-bottom:8px;line-height:1.1;\">Push hard and deep<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Straight arms. Press down about 5 cm, roughly 2 inches, then let the chest spring back.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 8px 22px rgba(62,71,150,0.10);position:relative;\">\n      <div style=\"position:absolute;top:22px;right:26px;font-family:'Playfair Display';font-weight:900;font-size:42px;color:#D7DAF5;\">03<\u002Fdiv>\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M10 28H18L23 16L33 40L38 28H46\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:26px;margin-bottom:8px;line-height:1.1;\">Keep the beat<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">100 to 120 pushes a minute. That is the tempo of Stayin' Alive or Baby Shark.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 8px 22px rgba(62,71,150,0.10);position:relative;\">\n      <div style=\"position:absolute;top:22px;right:26px;font-family:'Playfair Display';font-weight:900;font-size:42px;color:#D7DAF5;\">04<\u002Fdiv>\n      <div style=\"width:74px;height:74px;border-radius:18px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M14 28C14 20 20 14 28 14C34 14 38 17 41 21M42 14V21H35\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M42 28C42 36 36 42 28 42C22 42 18 39 15 35M14 42V35H21\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:26px;margin-bottom:8px;line-height:1.1;\">Do not stop<\u002Fdiv>\n      <p style=\"font-size:20px;font-weight:500;color:#5E6498;line-height:1.45;\">Keep going until an AED arrives, paramedics take over, or the person wakes up.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin:30px auto 0;background:#4E5BB8;border-radius:18px;padding:22px 34px;display:flex;align-items:center;gap:18px;max-width:1620px;width:100%;\">\n    <svg width=\"34\" height=\"34\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Fcircle><path d=\"M28 18V30\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"38\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n    <p style=\"font-size:23px;font-weight:600;color:#fff;\">You cannot make it worse. A heart that has stopped cannot be harmed by compressions, so doing something always beats doing nothing.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Using an AED\" data-screen-label=\"07\" data-speaker-notes=\"Demystify the AED. It is built for people with no training. You turn it on and it literally talks you through every step. It reads the heart and will only deliver a shock if one is needed, so you cannot accidentally shock someone who does not need it. Public AEDs are in malls, schools, arenas, and airports.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#BFC4F2;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 96px;\">\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:72px;left:100px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:70px;text-align:center;margin-bottom:8px;\">The AED Is on Your Side<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:42px;max-width:1260px;margin-left:auto;margin-right:auto;\">An AED is built for people with no training. Turn it on and it does the thinking, walking you through each step out loud.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:34px;max-width:1560px;margin:0 auto;width:100%;align-items:stretch;\">\n    <div style=\"display:flex;flex-direction:column;gap:15px;\">\n      <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:18px;padding:20px 26px;box-shadow:0 6px 18px rgba(62,71,150,0.08);\"><div style=\"flex:none;width:58px;height:58px;border-radius:14px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"19\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Fcircle><path d=\"M28 16V28\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><p style=\"font-size:23px;font-weight:600;line-height:1.3;color:#3E4796;\">Turn it on. The voice prompts start immediately.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:18px;padding:20px 26px;box-shadow:0 6px 18px rgba(62,71,150,0.08);\"><div style=\"flex:none;width:58px;height:58px;border-radius:14px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><rect x=\"11\" y=\"11\" width=\"14\" height=\"14\" rx=\"3\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Frect><rect x=\"31\" y=\"31\" width=\"14\" height=\"14\" rx=\"3\" stroke=\"#fff\" stroke-width=\"3.2\"><\u002Frect><\u002Fsvg><\u002Fdiv><p style=\"font-size:23px;font-weight:600;line-height:1.3;color:#3E4796;\">Stick the pads on bare skin, exactly as the pictures show.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:18px;padding:20px 26px;box-shadow:0 6px 18px rgba(62,71,150,0.08);\"><div style=\"flex:none;width:58px;height:58px;border-radius:14px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10V20M28 36V46M10 28H20M36 28H46M15 15L22 22M41 41L34 34M41 15L34 22M15 41L22 34\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><p style=\"font-size:23px;font-weight:600;line-height:1.3;color:#3E4796;\">Stand clear while it reads the heart. Do not touch the person.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;background:#ECEEFC;border-radius:18px;padding:20px 26px;box-shadow:0 6px 18px rgba(62,71,150,0.08);\"><div style=\"flex:none;width:58px;height:58px;border-radius:14px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><p style=\"font-size:23px;font-weight:600;line-height:1.3;color:#3E4796;\">Press shock if it tells you to, then go straight back to compressions.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#EE4F54;color:#fff;border-radius:24px;padding:44px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 12px 30px rgba(238,79,84,0.26);\">\n      <svg width=\"62\" height=\"62\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"margin-bottom:18px;\"><circle cx=\"28\" cy=\"28\" r=\"21\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L38 21\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:36px;line-height:1.05;margin-bottom:16px;\">You cannot shock the wrong person<\u002Fdiv>\n      <p style=\"font-size:22px;font-weight:500;line-height:1.5;opacity:0.96;\">The AED only delivers a shock if the heart actually needs one. If it does not, the button does nothing. That is why it is safe for anyone to grab and use.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"Choking &amp; recovery\" data-screen-label=\"08\" data-speaker-notes=\"Two everyday skills. Choking: if they can cough or speak, let them cough. If they cannot breathe, speak, or cough, give 5 firm back blows between the shoulder blades, then 5 abdominal thrusts, the Heimlich, and repeat. Recovery position: for someone unconscious but breathing normally, roll them onto their side so the airway stays clear and they do not choke if they vomit.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\">\n  <div style=\"position:absolute;top:84px;right:120px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.38;top:-130px;left:-110px;\"><\u002Fdiv>\n  <img src=\"dd979e4d-d671-46fc-afb6-5374f653064b\" alt=\"\" style=\"position:absolute;bottom:14px;left:24px;width:320px;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(62,71,150,0.16));\">\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Two More Skills Worth Knowing<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:44px;max-width:1180px;margin-left:auto;margin-right:auto;\">You will use these far more often than full CPR in everyday life.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\">\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:19px;background:#EE4F54;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"15\" r=\"8\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M16 47C16 36 21 30 28 30C35 30 40 36 40 47\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M24 18C25.5 20 30.5 20 32 18\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#D33A40;\">Choking adult<\u002Fdiv><\u002Fdiv>\n      <p style=\"font-size:24px;font-weight:700;color:#3E4796;margin-bottom:14px;\">Can they cough or speak? Let them cough it out.<\u002Fp>\n      <p style=\"font-size:22px;font-weight:500;color:#5E6498;line-height:1.55;text-align:justify;\">If they cannot breathe, speak, or cough, alternate <b>5 back blows<\u002Fb> between the shoulder blades with <b>5 abdominal thrusts<\u002Fb>. Repeat until it clears, or until they pass out, then start CPR.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:19px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"13\" cy=\"30\" r=\"6.5\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M21 34C29 30 33 38 43 33\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M30 6C33 6 35 9 33 12\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"36\" cy=\"16\" r=\"1.6\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#4E5BB8;\">Recovery position<\u002Fdiv><\u002Fdiv>\n      <p style=\"font-size:24px;font-weight:700;color:#3E4796;margin-bottom:14px;\">For someone unconscious but breathing normally.<\u002Fp>\n      <p style=\"font-size:22px;font-weight:500;color:#5E6498;line-height:1.55;text-align:justify;\">Roll them gently onto their <b>side<\u002Fb>, head tilted back, top knee bent for support. This keeps the airway open if they vomit. Call 911 and keep checking that they are breathing.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Recovery position\" data-screen-label=\"09\" data-speaker-notes=\"Walk through the recovery position physically if you can. Use it for anyone who is unconscious but breathing normally. Rolling them onto their side keeps the airway clear so they do not choke if they vomit. Stay with them and keep checking that they are still breathing until help arrives.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;align-items:center;gap:64px;padding:0 110px;\">\n  <div style=\"position:absolute;top:80px;right:120px;width:150px;height:46px;background-image:radial-gradient(#5763C4 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.38;bottom:-130px;left:-110px;\"><\u002Fdiv>\n  <div style=\"flex:none;width:620px;height:680px;border-radius:28px;border:6px solid #fff;box-shadow:0 16px 40px rgba(62,71,150,0.20);overflow:hidden;background:#DCE0F8;\">\n    <image-slot id=\"cpr-recovery-photo\" src=\"b411153d-7ff1-4469-9e88-12acdb1078e2\" style=\"width:100%;height:100%;display:block;background:#DCE0F8;\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a recovery-position photo here\"><\u002Fimage-slot>\n  <\u002Fdiv>\n  <div style=\"flex:1;\">\n    <div style=\"font-family:'Mulish';font-weight:800;font-size:22px;letter-spacing:1.5px;text-transform:uppercase;color:#8A92D8;margin-bottom:10px;\">When they are breathing, but out cold<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:64px;line-height:1.0;margin-bottom:18px;\">The Recovery Position<\u002Fh2>\n    <p style=\"font-family:'Mulish';font-weight:500;font-size:23px;color:#5E6498;line-height:1.5;margin-bottom:30px;max-width:760px;\">Use it for anyone who is unconscious but breathing normally. Lying on their side keeps the airway open so they cannot choke if they are sick.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:16px;max-width:780px;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#4E5BB8;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">1<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#3E4796;\">Kneel beside them and straighten their legs.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#4E5BB8;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">2<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#3E4796;\">Roll them gently onto their side, top knee bent for support.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#4E5BB8;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">3<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#3E4796;\">Tilt the head back gently to keep the airway open.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;\"><div style=\"flex:none;width:50px;height:50px;border-radius:14px;background:#EE4F54;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:800;font-size:24px;\">4<\u002Fdiv><p style=\"font-size:22px;font-weight:600;color:#3E4796;\">Call 911 and keep checking that they are breathing.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Myth vs fact\" data-screen-label=\"10\" data-speaker-notes=\"Bust the fears that stop people from acting. The biggest killer is hesitation. Good Samaritan protections and common sense are both on the side of someone who tries to help.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#BFC4F2;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 96px;\">\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;bottom:70px;left:104px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <div style=\"position:absolute;width:280px;height:280px;border-radius:50%;border:44px solid #6B75D6;opacity:0.38;top:-120px;right:-100px;\"><\u002Fdiv>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">What Stops People Is Fear<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:44px;max-width:1180px;margin-left:auto;margin-right:auto;\">Three worries hold people back from helping. None of them hold up.<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:18px;max-width:1560px;margin:0 auto;width:100%;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\">\n      <div style=\"background:#E3DCF4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#9B6FC7\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#9B6FC7\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#6A5A8C;\">\"I will break their ribs and make it worse.\"<\u002Fp><\u002Fdiv>\n      <div style=\"background:#ECEEFC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#4E5BB8\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#4E5BB8\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#3E4796;\">A stopped heart cannot get worse. Cracked ribs heal. Doing nothing does not.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\">\n      <div style=\"background:#E3DCF4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#9B6FC7\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#9B6FC7\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#6A5A8C;\">\"I am not trained, so I should not touch them.\"<\u002Fp><\u002Fdiv>\n      <div style=\"background:#ECEEFC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#4E5BB8\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#4E5BB8\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#3E4796;\">Hands-only CPR needs no training, and 911 will coach you live.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\">\n      <div style=\"background:#E3DCF4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#9B6FC7\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#9B6FC7\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#6A5A8C;\">\"I could get sued for helping.\"<\u002Fp><\u002Fdiv>\n      <div style=\"background:#ECEEFC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" style=\"flex:none;\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#4E5BB8\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#4E5BB8\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#3E4796;\">Good Samaritan laws across Canada protect people who help in good faith.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"Activity\" data-screen-label=\"11\" data-speaker-notes=\"Get them out of their seats. Run the scene as a group: who calls 911, who starts compressions, who runs for the AED. Practise the 100 to 120 beat by clapping to Stayin Alive. The discussion questions work even without a manikin.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#C6CAF5;font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\">\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:104px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #6B75D6;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv>\n  <img src=\"f5bc0265-0c2b-41c6-8bca-598dcb383627\" alt=\"\" style=\"position:absolute;bottom:30px;right:24px;width:360px;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(62,71,150,0.16));\">\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:74px;text-align:center;margin-bottom:8px;\">Your Turn, Act It Out<\u002Fh2>\n  <p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#5E6498;text-align:center;margin-bottom:44px;\">Get into groups of three and run the scene out loud.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\">\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:34px;color:#D33A40;margin-bottom:18px;\">The scene<\u002Fdiv>\n      <p style=\"font-size:23px;font-weight:500;color:#5E6498;line-height:1.5;margin-bottom:18px;\">Someone collapses in the cafeteria. Take a role and play it out.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"background:#DCE0F8;border-radius:13px;padding:15px 22px;font-size:21px;font-weight:700;color:#3E4796;display:flex;align-items:center;gap:14px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#4E5BB8\" stroke-width=\"3.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Caller phones 911, speaker on<\u002Fdiv>\n        <div style=\"background:#DCE0F8;border-radius:13px;padding:15px 22px;font-size:21px;font-weight:700;color:#3E4796;display:flex;align-items:center;gap:14px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#4E5BB8\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Compressor starts CPR to the beat<\u002Fdiv>\n        <div style=\"background:#DCE0F8;border-radius:13px;padding:15px 22px;font-size:21px;font-weight:700;color:#3E4796;display:flex;align-items:center;gap:14px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#4E5BB8\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Runner finds the nearest AED<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#ECEEFC;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(62,71,150,0.10);\">\n      <div style=\"font-family:'Playfair Display';font-weight:800;font-size:34px;color:#4E5BB8;margin-bottom:18px;\">Talk about it<\u002Fdiv>\n      <ul style=\"font-size:23px;font-weight:500;color:#5E6498;line-height:1.7;padding-left:24px;margin:0;\">\n        <li>Where are the AEDs in <b>our school<\u002Fb>? Could you find one in sixty seconds?<\u002Fli>\n        <li>What is one reason people freeze, and how do we beat it?<\u002Fli>\n        <li>Clap \"Stayin' Alive\" together. That is your compression speed.<\u002Fli>\n        <li>Name three people you would want to know this skill.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Recap\" data-screen-label=\"12\" data-speaker-notes=\"Land the three things to remember forever: Call, Push, Shock. Share the resources. Encourage a real certified course with the Red Cross, St John Ambulance, or Heart and Stroke. Leave Kids Help Phone up in case the topic raised anything personal.\" style=\"width:100%;height:100%;box-sizing:border-box;background:linear-gradient(150deg,#B7C2EF 0%,#C6CAF5 70%);font-family:'Mulish',sans-serif;color:#3E4796;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 110px;\">\n  <div style=\"position:absolute;width:380px;height:380px;border-radius:50%;border:54px solid #6B75D6;opacity:0.40;top:-160px;right:-150px;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:200px;height:200px;border-radius:50%;background:#5763C4;opacity:0.5;bottom:-100px;left:-100px;\"><\u002Fdiv>\n  <svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:70px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#3E4796\" stroke-width=\"6\"><\u002Frect><\u002Fsvg>\n  <h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:76px;margin-bottom:30px;position:relative;\">Three Words to Remember<\u002Fh2>\n  <div style=\"display:flex;gap:22px;margin-bottom:42px;position:relative;\">\n    <div style=\"width:230px;background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 10px 26px rgba(62,71,150,0.12);\"><div style=\"width:76px;height:76px;border-radius:19px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M19 8H25L28 19L23 22C25 28 30 33 36 35L39 30L50 33V39C50 44 46 47 41 46C24 43 13 32 10 15C9 10 12 8 17 8\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;\">Call<\u002Fdiv><\u002Fdiv>\n    <div style=\"width:230px;background:#ECEEFC;border-radius:22px;padding:30px;box-shadow:0 10px 26px rgba(62,71,150,0.12);\"><div style=\"width:76px;height:76px;border-radius:19px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 47C28 47 9 35 9 21.5C9 15 13 11.5 17.5 11.5C21.5 11.5 25 14 28 18C31 14 34.5 11.5 38.5 11.5C43 11.5 47 15 47 21.5C47 35 28 47 28 47Z\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;\">Push<\u002Fdiv><\u002Fdiv>\n    <div style=\"width:230px;background:#EE4F54;border-radius:22px;padding:30px;box-shadow:0 12px 28px rgba(238,79,84,0.28);\"><div style=\"width:76px;height:76px;border-radius:19px;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#fff;\">Shock<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:1180px;width:100%;position:relative;\">\n    <div style=\"background:rgba(255,255,255,0.5);border-radius:18px;padding:26px 32px;text-align:left;\"><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;margin-bottom:8px;\">Get certified<\u002Fdiv><p style=\"font-size:21px;font-weight:500;color:#5E6498;line-height:1.4;\">Take a hands-on course with the Canadian Red Cross, St. John Ambulance, or Heart &amp; Stroke.<\u002Fp><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,0.5);border-radius:18px;padding:26px 32px;text-align:left;\"><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;margin-bottom:8px;\">Need to talk?<\u002Fdiv><p style=\"font-size:21px;font-weight:500;color:#5E6498;line-height:1.4;\">Kids Help Phone, call 1-800-668-6868 or text CONNECT to 686868, any time.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:54px;display:flex;align-items:center;gap:12px;\"><div style=\"width:38px;height:38px;border-radius:11px;background:#4E5BB8;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 5v14M5 12h14\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font-family:'Playfair Display';font-weight:700;font-size:24px;color:#3E4796;\">Together for Health<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n<!--MORE-->\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
