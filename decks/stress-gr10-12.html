document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Not All Stress Is Bad<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5A60;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">The same alarm system can sharpen you up or wear you down.<\u002Fp><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;max-width:1480px;margin:0 auto;width:100%;\"><div style=\"background:#FCE6E4;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#C23E4D;\">Stress<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#A83A4A;margin-bottom:13px;\">Your body’s natural response to a demand or threat.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#8E5A60;line-height:1.55;text-align:justify;\">Heart rate rises, breathing quickens, muscles tense. It is designed to be short-term, and in small doses it can sharpen focus and performance.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:24px;padding:44px;box-shadow:0 10px 28px rgba(60,55,95,0.10);\"><div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><div style=\"width:78px;height:78px;border-radius:18px;background:#3FA9A0;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"42\" height=\"42\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10L48 44H8L28 10Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 24V33\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"39\" r=\"1.7\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Playfair Display';font-weight:800;font-size:38px;color:#C23E4D;\">Chronic stress<\u002Fdiv><\u002Fdiv><p style=\"font-size:24px;font-weight:700;color:#A83A4A;margin-bottom:13px;\">Stress that never switches off.<\u002Fp><div style=\"font-size:22px;font-weight:500;color:#8E5A60;line-height:1.55;text-align:justify;\">When the alarm stays on for weeks, it wears down sleep, focus, mood, and health. That is the kind worth managing early.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Why it matters\" data-screen-label=\"04\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#FAD9D6;font-family:'Mulish',sans-serif;color:#A83A4A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"015a3718-2ca3-4b80-ab29-f2c54a781a5d\" alt=\"\" style=\"position:absolute;right:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;right:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#A83A4A\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;bottom:80px;left:104px;width:150px;height:46px;background-image:radial-gradient(#E45D6B 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Why This Matters<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5A60;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Everyone feels it. Understanding how it works is the first tool.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"background:#FCE6E4;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E4D;\">Normal<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5A60;margin-top:12px;line-height:1.4;\">stress is a healthy response everyone feels, not a flaw.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E4D;\">Teens<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5A60;margin-top:12px;line-height:1.4;\">name school, friendships, and the future as top stressors.<\u002Fdiv><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(60,55,95,0.10);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#C23E4D;\">Body<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#8E5A60;margin-top:12px;line-height:1.4;\">chronic stress disrupts sleep, focus, and the immune system.<\u002Fdiv><\u002Fdiv><div style=\"background:#3FA9A0;border-radius:22px;padding:36px 30px;box-shadow:0 8px 24px rgba(40,40,80,0.16);\"><div style=\"font-family:'Playfair Display';font-weight:900;font-size:68px;line-height:1;color:#fff;\">Name it<\u002Fdiv><div style=\"font-size:20px;font-weight:700;color:#fff;margin-top:12px;line-height:1.4;\">labelling an emotion measurably lowers its intensity.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-family:'Mulish';font-size:18px;font-weight:600;color:#D68A8E;text-align:center;margin-top:34px;\">Source: Canadian Mental Health Association (CMHA)<\u002Fp><\u002Fsection>\n<section data-label=\"In your body\" data-screen-label=\"05\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F6C9C4;font-family:'Mulish',sans-serif;color:#A83A4A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"dfc262cd-cdb1-4fc5-bef6-76b949edc54f\" alt=\"\" style=\"position:absolute;left:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><div style=\"position:absolute;top:84px;left:110px;width:150px;height:46px;background-image:radial-gradient(#E45D6B 32%,transparent 34%);background-size:25px 24px;opacity:0.85;\"><\u002Fdiv><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08A93;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">Fight, Flight, or Freeze<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5A60;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">Stress hits the body first. Here's what's going on inside.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 46C28 46 8 34 8 20.5C8 14 12.5 10.5 17 10.5C21 10.5 25 13 28 17C31 13 35 10.5 39 10.5C43.5 10.5 48 14 48 20.5C48 34 28 46 28 46Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Racing heart<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Pumps blood to your muscles<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 10V26\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M22 22C22 22 16 24 14 32C12 40 14 46 20 46C24 46 24 41 24 37V26C24 22 22 22 22 22Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M34 22C34 22 40 24 42 32C44 40 42 46 36 46C32 46 32 41 32 37V26C32 22 34 22 34 22Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Fast breathing<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Grabs more oxygen<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Tense muscles<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Primed to react<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M24 12C18 12 15 16 16 21C12 22 12 28 16 30C15 35 19 39 24 38M32 12C38 12 41 16 40 21C44 22 44 28 40 30C41 35 37 39 32 38M24 12C26 10 30 10 32 12M24 38C26 40 30 40 32 38M28 13V38\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Tunnel focus<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Hard to think clearly<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M8 28C12 19 19 14 28 14C37 14 44 19 48 28C44 37 37 42 28 42C19 42 12 37 8 28Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"28\" cy=\"28\" r=\"7\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Heightened senses<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">On high alert<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"31\" r=\"16\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M28 22V31L34 35M22 9H34M28 9V15\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Built to be brief<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Meant to switch off after<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"When it piles up\" data-screen-label=\"06\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#FAD9D6;font-family:'Mulish',sans-serif;color:#A83A4A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"666f70f1-e9cd-43d3-aed7-fb24ab2f6d25\" alt=\"\" style=\"position:absolute;right:26px;bottom:26px;width:128px;height:auto;z-index:0;pointer-events:none;filter:drop-shadow(0 8px 18px rgba(40,40,80,0.16));\"><svg width=\"160\" height=\"60\" viewBox=\"0 0 170 64\" fill=\"none\" style=\"position:absolute;top:74px;left:110px;\"><rect x=\"30\" y=\"22\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#F2E7C9\" stroke-width=\"7\"><\u002Frect><rect x=\"20\" y=\"13\" width=\"120\" height=\"30\" rx=\"15\" stroke=\"#A83A4A\" stroke-width=\"6\"><\u002Frect><\u002Fsvg><div style=\"position:absolute;width:300px;height:300px;border-radius:50%;border:46px solid #F08A93;opacity:0.38;bottom:-130px;right:-110px;\"><\u002Fdiv><h2 style=\"font-family:'Playfair Display';font-weight:800;font-size:72px;text-align:center;margin-bottom:8px;\">The Cost of Chronic Stress<\u002Fh2><p style=\"font-family:'Mulish';font-weight:600;font-size:25px;color:#8E5A60;text-align:center;margin-bottom:46px;max-width:1200px;margin-left:auto;margin-right:auto;\">When stress never switches off, it starts to cost you.<\u002Fp><div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M41 32C37 38 29 40 23 36C17 32 16 24 20 18C13 20 9 28 12 35C15 43 24 47 32 44C37 42 40 38 41 32Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Poor sleep<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Lying awake, wired<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M24 12C18 12 15 16 16 21C12 22 12 28 16 30C15 35 19 39 24 38M32 12C38 12 41 16 40 21C44 22 44 28 40 30C41 35 37 39 32 38M24 12C26 10 30 10 32 12M24 38C26 40 30 40 32 38M28 13V38\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\"> -radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M28 19C24 13 16 14 14 21C12 28 18 44 28 44C38 44 44 28 42 21C40 14 32 13 28 19Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M28 19V13C28 10 31 8 34 9\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Appetite changes<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Eating more or less<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M31 7L16 32H27L25 49L41 23H30L31 7Z\" stroke=\"#fff\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Burnout<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Drained and overwhelmed<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"Tools that work\" data-screen-label=\"07\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F6C9C4;font-family:'Mulish',sans-serif;color:#A83A4A;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 110px;\"><img src=\"41a4583c-8f38-4b50-ab07-37012a7b0b51\" alt=\"\" ;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"35\" cy=\"12\" r=\"5\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle><path d=\"M31 21L22 27L28 33L24 47M28 33L38 37L43 31M22 27L13 24\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Move your body<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">Exercise burns off stress hormones.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"38\" height=\"38\" viewBox=\"0 0 56 56\" fill=\"none\"><path d=\"M22 16H46M22 28H46M22 40H46\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"13\" cy=\"16\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"13\" cy=\"28\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"13\" cy=\"40\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><div><div style=\"font-family:'Playfair Display';font-weight:700;font-size:26px;line-height:1.08;\">Break it down<\u002Fdiv><div style=\"font-size:20px;color:#D68A8E;font-weight:600;margin-top:5px;\">One task at a time beats one big pile.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;background:#FCE6E4;border-radius:20px;padding:24px 26px;box-shadow:0 8px 22px rgba(60,55,95,0.10);\"><div style=\"width:74px;height:74px;border-radius:18px;background:#E45D6B;displa uto;\">A few things people get wrong about stress.<\u002Fp><div style=\"display:flex;flex-direction:column;gap:18px;max-width:1560px;margin:0 auto;width:100%;\"><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#F4C0BC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#D68A8E\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#D68A8E\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#8E5A60;\">All stress is bad for you.<\u002Fp><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#E45D6B\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#E45D6B\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#A83A4A;\">Short-term stress can sharpen focus and motivate you.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#F4C0BC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#D68A8E\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#D68A8E\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#8E5A60;\">Stress just means you cannot cope.<\u002Fp><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#E45D6B\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#E45D6B\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#A83A4A;\">It is a universal body response, not a personal weakness.<\u002Fp><\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;\"><div style=\"background:#F4C0BC;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#D68A8E\" stroke-width=\"3\"><\u002Fcircle><path d=\"M20 20L36 36M36 20L20 36\" stroke=\"#D68A8E\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:600;line-height:1.35;color:#8E5A60;\">You should push through and ignore it.<\u002Fp><\u002Fdiv><div style=\"background:#FCE6E4;border-radius:18px;padding:24px 30px;display:flex;gap:18px;align-items:center;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\"><circle cx=\"28\" cy=\"28\" r=\"20\" stroke=\"#E45D6B\" stroke-width=\"3\"><\u002Fcircle><path d=\"M19 28L25 34L37 21\" stroke=\"#E45D6B\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><p style=\"font-size:23px;font-weight:700;line-height:1.35;color:#A83A4A;\">Ignoring chronic stress makes it worse, not stronger.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section data-label=\"In focus\" data-screen-label=\"09\" data-speaker-notes=\"\" style=\"width:100%;height:100%;box-sizing:border-box;background:#F6C9C4;font-family:'Mulish',sans-serif;color:#A83A4A;position:relative;overflow:hidden;display:flex;align-items:
